<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Tracking</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;width:100vw;height:100vh;font-family:monospace}
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0.3}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#status{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);transition:color .4s}
#status.active{color:rgba(180,255,180,.9)}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(255,255,255,.4);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,.08);border-top-color:rgba(180,255,180,.6);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="status">Zeig beide Hände!</div>
<div id="loading"><div class="spinner"></div>Lade Hand Tracking…</div>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const statusEl=document.getElementById('status');
const loadingEl=document.getElementById('loading');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// Alle Punkte pro Hand die wir verbinden: alle 21 landmarks
const NODES=14;
let handData=[];

// Bänder: nodes array für jedes Paar
let bandCache={};

function getBand(key,ax,ay,bx,by){
  if(!bandCache[key]){
    bandCache[key]=Array.from({length:NODES},(_,i)=>{
      const t=i/(NODES-1);
      return{x:ax+(bx-ax)*t, y:ay+(by-ay)*t, vx:0, vy:0};
    });
  }
  return bandCache[key];
}

function updateBand(band,ax,ay,bx,by){
  band[0].x=ax;band[0].y=ay;
  band[NODES-1].x=bx;band[NODES-1].y=by;
  for(let i=1;i<NODES-1;i++){
    const t=i/(NODES-1);
    const tx=ax+(bx-ax)*t, ty=ay+(by-ay)*t;
    const sag=Math.sin(Math.PI*t)*20;
    band[i].vx+=(tx-band[i].x)*.18;
    band[i].vy+=(ty+sag-band[i].y)*.18;
    band[i].vy+=.25;
    band[i].vx*=.83;band[i].vy*=.83;
    band[i].x+=band[i].vx;band[i].y+=band[i].vy;
  }
}

function drawBand(band,hue,alpha){
  ctx.beginPath();ctx.moveTo(band[0].x,band[0].y);
  for(let i=1;i<band.length;i++)ctx.lineTo(band[i].x,band[i].y);
  ctx.shadowBlur=10;
  ctx.shadowColor=`hsla(${hue},90%,65%,.7)`;
  ctx.strokeStyle=`hsla(${hue},80%,70%,${alpha})`;
  ctx.lineWidth=1.2;ctx.lineCap='round';ctx.stroke();
  ctx.shadowBlur=0;
}

function drawHandDots(hand){
  // Alle Fingertips leuchten
  const TIPS=[4,8,12,16,20];
  for(const t of TIPS){
    const p=hand[t];
    ctx.shadowBlur=22;ctx.shadowColor='rgba(200,255,200,1)';
    ctx.fillStyle='rgba(220,255,220,1)';
    ctx.beginPath();ctx.arc(p.x*W,p.y*H,5,0,Math.PI*2);ctx.fill();
  }
  // Skeleton leicht
  const C=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
  ctx.shadowBlur=2;ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=0.8;
  for(const[a,b]of C){ctx.beginPath();ctx.moveTo(hand[a].x*W,hand[a].y*H);ctx.lineTo(hand[b].x*W,hand[b].y*H);ctx.stroke();}
  ctx.shadowBlur=0;
}

function render(){
  ctx.clearRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W/2,H/2,H*.1,W/2,H/2,H*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,8,.82)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  if(handData.length>=1){
    // Alle Punkte sammeln (alle landmarks beider Hände)
    let allPoints=[];
    for(let hi=0;hi<handData.length;hi++){
      for(let pi=0;pi<21;pi++){
        allPoints.push({x:handData[hi][pi].x*W, y:handData[hi][pi].y*H, hi, pi});
      }
    }

    // Jeder Punkt mit jedem verbinden – aber nur nahe genug
    const MAX_DIST=W*0.55;
    for(let i=0;i<allPoints.length;i++){
      for(let j=i+1;j<allPoints.length;j++){
        const a=allPoints[i], b=allPoints[j];
        const dx=a.x-b.x, dy=a.y-b.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>MAX_DIST)continue;
        const key=`${a.hi}-${a.pi}-${b.hi}-${b.pi}`;
        const band=getBand(key,a.x,a.y,b.x,b.y);
        updateBand(band,a.x,a.y,b.x,b.y);
        const alpha=Math.max(0,(1-dist/MAX_DIST)*0.7);
        const hue=100+i*8;
        drawBand(band,hue,alpha);
      }
    }

    // Hände zeichnen
    for(const hand of handData) drawHandDots(hand);
  }

  requestAnimationFrame(render);
}

async function init(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720,facingMode:'user'},audio:false});
    video.srcObject=stream;await new Promise(r=>video.onloadedmetadata=r);
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.75,minTrackingConfidence:.65});
    hands.onResults(r=>{
      handData=(r.multiHandLandmarks||[]).map(lm=>lm.map(p=>({x:1-p.x,y:p.y})));
      const c=handData.length;
      statusEl.textContent=c===2?'Web aktiv!':c===1?'Zweite Hand zeigen!':'Zeig beide Hände!';
      statusEl.className=c>0?'active':'';
    });
    const cam=new Camera(video,{onFrame:async()=>{await hands.send({image:video});},width:1280,height:720});
    await cam.start();loadingEl.style.display='none';render();
  }catch(e){
    loadingEl.innerHTML='<p style="color:rgba(255,100,100,.7)">Kamera-Zugriff verweigert.<br>Bitte erlaube die Kamera.</p>';
  }
}
init();
</script>
</body>
</html>
